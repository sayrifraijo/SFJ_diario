<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sayri · Hoy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --cream: #F7F4EE;
    --ink: #1C1A17;
    --muted: #7A7570;
    --accent: #3D5A4F;
    --accent-light: #EAF0EC;
    --warm: #C17F4A;
    --warm-light: #FBF3EB;
    --border: #E2DDD6;
    --fuerza: #3D5A4F;
    --cardio: #2B4A6B;
    --domingo: #5C3D6E;
    --descanso: #7A7570;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    padding: 0 0 80px;
  }

  /* HEADER */
  .header {
    padding: 40px 24px 32px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .fecha-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .dia-nombre {
    font-family: 'DM Serif Display', serif;
    font-size: 48px;
    line-height: 1;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .fecha-completa {
    font-size: 13px;
    color: var(--muted);
    font-weight: 400;
  }

  .semana-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-light);
    color: var(--accent);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;
    padding: 4px 10px;
    border-radius: 20px;
    margin-top: 14px;
  }

  /* NAV DÍAS */
  .nav-dias {
    display: flex;
    gap: 6px;
    padding: 16px 24px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }
  .nav-dias::-webkit-scrollbar { display: none; }

  .nav-dia {
    flex-shrink: 0;
    width: 44px;
    height: 52px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.15s;
    gap: 2px;
  }

  .nav-dia span:first-child {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .nav-dia span:last-child {
    font-size: 16px;
    font-weight: 500;
    color: var(--ink);
  }

  .nav-dia.activo {
    background: var(--ink);
    border-color: var(--ink);
  }
  .nav-dia.activo span { color: white !important; }

  .nav-dia:hover:not(.activo) {
    background: var(--accent-light);
    border-color: var(--accent);
  }

  /* CONTENT */
  .content { padding: 24px; }

  /* EJERCICIO CARD */
  .ejercicio-card {
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .ejercicio-header {
    padding: 20px 22px;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .ejercicio-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .ejercicio-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: white;
    line-height: 1.1;
  }

  .ejercicio-subtitle {
    font-size: 12px;
    color: rgba(255,255,255,0.7);
    margin-top: 2px;
  }

  .ejercicio-body {
    background: white;
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 16px 16px;
    overflow: hidden;
  }

  /* FASES */
  .fase {
    padding: 16px 22px;
    border-bottom: 1px solid var(--border);
  }
  .fase:last-child { border-bottom: none; }

  .fase-label {
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    font-weight: 500;
  }

  .ejercicio-item {
    display: flex;
    gap: 12px;
    margin-bottom: 10px;
    align-items: flex-start;
  }
  .ejercicio-item:last-child { margin-bottom: 0; }

  .ej-bullet {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    margin-top: 6px;
    flex-shrink: 0;
  }

  .ej-nombre {
    font-weight: 500;
    font-size: 14px;
    color: var(--ink);
    line-height: 1.3;
  }

  .ej-detalle {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    line-height: 1.4;
  }

  .ej-sets {
    font-size: 11px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-light);
    padding: 2px 8px;
    border-radius: 10px;
    margin-top: 4px;
    display: inline-block;
  }

  /* HORARIO */
  .seccion-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 12px;
    margin-top: 24px;
  }

  .timeline {
    background: white;
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }

  .timeline-item {
    display: flex;
    gap: 16px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    align-items: flex-start;
  }
  .timeline-item:last-child { border-bottom: none; }

  .t-hora {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    min-width: 52px;
    padding-top: 1px;
    font-variant-numeric: tabular-nums;
  }

  .t-texto {
    font-size: 14px;
    color: var(--ink);
    line-height: 1.4;
    flex: 1;
  }

  .t-emoji { margin-right: 4px; }

  /* HÁBITOS NOCHE */
  .habitos-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }

  .habito-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .habito-icon {
    font-size: 18px;
    width: 32px;
    text-align: center;
  }

  .habito-texto {
    font-size: 12px;
    color: var(--ink);
    line-height: 1.3;
    font-weight: 400;
  }

  .habito-tiempo {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ESPECIAL DOMINGO */
  .domingo-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .domingo-item {
    display: flex;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    gap: 14px;
    align-items: flex-start;
  }
  .domingo-item:last-child { border-bottom: none; }

  .d-tiempo {
    font-size: 10px;
    color: var(--muted);
    min-width: 80px;
    padding-top: 2px;
    font-variant-numeric: tabular-nums;
  }

  .d-contenido { flex: 1; }
  .d-titulo { font-size: 14px; font-weight: 500; color: var(--ink); }
  .d-desc { font-size: 12px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

  /* SPRINT AVISO */
  .sprint-aviso {
    background: var(--warm-light);
    border: 1px solid #E8C89A;
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 13px;
    color: var(--warm);
    font-weight: 500;
    margin-bottom: 12px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  /* DESCANSO */
  .descanso-msg {
    background: white;
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px;
    text-align: center;
    margin-bottom: 20px;
  }
  .descanso-emoji { font-size: 36px; margin-bottom: 12px; }
  .descanso-titulo {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    margin-bottom: 6px;
  }
  .descanso-desc { font-size: 14px; color: var(--muted); line-height: 1.5; }

  /* SEMANA SELECTOR */
  .semana-selector {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: white;
  }

  .semana-selector label {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .semana-selector select {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    background: white;
    cursor: pointer;
  }

  /* COLORS POR TIPO */
  .bg-fuerza { background: var(--fuerza); }
  .bg-cardio { background: var(--cardio); }
  .bg-domingo { background: var(--domingo); }
  .bg-descanso { background: var(--muted); }
</style>
</head>

    <option value="1">Semana 1–2 · Inicio (sin sprints)</option>
    <option value="3">Semana 3 · 1 sprint al final</option>
    <option value="4">Semana 4+ · 2 sprints por sesión</option>

</div>

<div class="nav-dias" id="navDias"></div>

<div class="content" id="contenidoDia"></div>

let diaActual = new Date().getDay(); // 0=domingo
let semanaActual = 1;

function actualizarSemana() {
  semanaActual = parseInt(document.getElementById('semanaSelect').value);
  renderDia(diaActual);
}

function getSemanaLabel() {
  const s = semanaActual;
  if (s <= 2) return 'Sem 1–2 · Sin sprints';
  if (s === 3) return 'Sem 3 · 1 sprint';
  return 'Sem 4+ · 2 sprints';
}

function sprintBloque() {
  if (semanaActual < 3) return '';
  const cantidad = semanaActual === 3 ? 1 : 2;
  const texto = cantidad === 1
    ? '1 sprint al final · 30 seg a tope'
    : '2 sprints · Recuperación 90 seg–2 min entre cada uno';

}

function mov(items) {
  return items.map(([nombre, detalle, sets]) => `
    <div class="ejercicio-item">
      <div class="ej-bullet" style="background:#2B4A6B"></div>
      <div>
        <div class="ej-nombre">${nombre}</div>
        <div class="ej-detalle">${detalle}</div>
        <span class="ej-sets" style="background:#EAF0F6; color:#2B4A6B">${sets}</span>
      </div>
    </div>
  `).join('');
}

function fuerza(items) {
  return items.map(([nombre, detalle, sets]) => `
    <div class="ejercicio-item">
      <div class="ej-bullet"></div>
      <div>
        <div class="ej-nombre">${nombre}</div>
        <div class="ej-detalle">${detalle}</div>
        <span class="ej-sets">${sets}</span>
      </div>
    </div>
  `).join('');
}

function horarioDia(items) {
  return `
    <div class="seccion-label">Horario del día</div>
    <div class="timeline">
      ${items.map(([hora, emoji, texto]) => `
        <div class="timeline-item">
          <div class="t-hora">${hora}</div>
          <div class="t-texto"><span class="t-emoji">${emoji}</span>${texto}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function domingoItem(tiempo, emoji, titulo, desc) {
  return `
    <div class="domingo-item">
      <div class="d-tiempo">${tiempo}</div>
      <div class="d-contenido">
        <div class="d-titulo">${emoji} ${titulo}</div>
        <div class="d-desc">${desc}</div>
      </div>
    </div>
  `;
}

function renderDia(dia) {
  diaActual = dia;

  // Header
  const now = new Date();
  // Calcular fecha del día seleccionado esta semana
  const hoy = now.getDay();
  const diff = dia - hoy;
  const fecha = new Date(now);
  fecha.setDate(now.getDate() + diff);

  document.getElementById('diaNombre').textContent = DIAS[dia];
  document.getElementById('fechaCompleta').textContent =
    `${fecha.getDate()} de ${MESES[fecha.getMonth()]} ${fecha.getFullYear()}`;
  document.getElementById('semanaBadge').textContent = `⬤ ${getSemanaLabel()}`;

  // Nav activo
  document.querySelectorAll('.nav-dia').forEach((el, i) => {
    el.classList.toggle('activo', i === dia);
  });

  // Contenido
  document.getElementById('contenidoDia').innerHTML = PLAN[dia]();
}

function init() {
  // Crear nav
  const nav = document.getElementById('navDias');
  const now = new Date();

  for (let i = 0; i < 7; i++) {
    // Calcular fecha de este día de la semana
    const diff = i - now.getDay();
    const fecha = new Date(now);
    fecha.setDate(now.getDate() + diff);

    const btn = document.createElement('button');
    btn.className = 'nav-dia' + (i === now.getDay() ? ' activo' : '');
    btn.innerHTML = `<span>${DIAS_CORTO[i]}</span><span>${fecha.getDate()}</span>`;
    btn.onclick = () => renderDia(i);
    nav.appendChild(btn);
  }

  renderDia(now.getDay());
}

init();
</script>
